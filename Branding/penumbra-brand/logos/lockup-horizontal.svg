<svg width="760" height="220" viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aphelion by Penumbra">
  <defs>
    
    <linearGradient id="lh-ring" x1="0.12" y1="0.1" x2="0.9" y2="0.92">
      <stop offset="0%" stop-color="#22D3EE"></stop><stop offset="34%" stop-color="#5EEAD4"></stop>
      <stop offset="62%" stop-color="#C084FC"></stop><stop offset="100%" stop-color="#FF79C6"></stop>
    </linearGradient>
    <radialGradient id="lh-bloom" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#22D3EE" stop-opacity="0"></stop>
      <stop offset="82%" stop-color="#5EEAD4" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="lh-planet" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#FFE6F5"></stop><stop offset="45%" stop-color="#FF79C6"></stop><stop offset="100%" stop-color="#C084FC"></stop>
    </radialGradient>
    <linearGradient id="lh-tag" x1="0" y1="0" x2="1" y2="0">
