  <text class="lh-word" font-family="&#39;Space Grotesk&#39;,&#39;Segoe UI&#39;,system-ui,sans-serif" font-weight="500" fill="#ECFEFF" x="236" y="108" font-size="64" letter-spacing="-0.01em">Aphelion</text>
  <rect x="240" y="128" width="80" height="3" rx="1.5" fill="url(#lh-tag)"></rect>
  <text class="lh-mono" font-family="&#39;JetBrains Mono&#39;,&#39;Consolas&#39;,monospace" font-weight="500" x="240" y="162" font-size="14" fill="url(#lh-tag)">LOCAL AI · BY PENUMBRA</text>
</svg>