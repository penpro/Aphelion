<svg width="420" height="380" viewBox="0 0 420 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aphelion by Penumbra">
  <defs>
    
    <linearGradient id="ls-ring" x1="0.12" y1="0.1" x2="0.9" y2="0.92">
      <stop offset="0%" stop-color="#22D3EE"></stop><stop offset="34%" stop-color="#5EEAD4"></stop>
      <stop offset="62%" stop-color="#C084FC"></stop><stop offset="100%" stop-color="#FF79C6"></stop>
    </linearGradient>
    <radialGradient id="ls-bloom" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#22D3EE" stop-opacity="0"></stop>
      <stop offset="82%" stop-color="#5EEAD4" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="ls-planet" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#FFE6F5"></stop><stop offset="45%" stop-color="#FF79C6"></stop><stop offset="100%" stop-color="#C084FC"></stop>
    </radialGradient>
    <linearGradient id="ls-tag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EEAD4"></stop><stop offset="100%" stop-color="#C084FC"></stop>
    </linearGradient>
    <filter id="ls-soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="8"></feGaussianBlur></filter>
    <filter id="ls-rim" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2"></feGaussianBlur></filter>
    <filter id="ls-halo" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="4.5"></feGaussianBlur></filter>
  </defs>

  <g transform="translate(210,130)">
    <g stroke="#5EEAD4" stroke-width="1.2" opacity="0.4"><path d="M0 -116 v12 M0 104 v12 M-116 0 h12 M104 0 h12"></path></g>
    <g transform="rotate(-20)">
      <ellipse cx="0" cy="0" rx="103" ry="82" fill="none" stroke="url(#ls-ring)" stroke-width="1.4" opacity="0.5"></ellipse>
      <circle cx="103" cy="0" r="14" fill="#FF79C6" opacity="0.5" filter="url(#ls-halo)"></circle>
      <circle cx="103" cy="0" r="6" fill="url(#ls-planet)"></circle>
      <circle cx="100.6" cy="-2.4" r="1.7" fill="#FFFFFF" opacity="0.9"></circle>
    </g>
    <circle r="84" fill="url(#ls-bloom)" filter="url(#ls-soft)"></circle>
    <circle r="70" fill="none" stroke="url(#ls-ring)" stroke-width="19" filter="url(#ls-soft)" opacity="0.85"></circle>
    <circle r="68" fill="#000000"></circle>
    <circle r="69" fill="none" stroke="url(#ls-ring)" stroke-width="5" filter="url(#ls-rim)"></circle>
    <circle r="69" fill="none" stroke="#ECFEFF" stroke-width="1.3" opacity="0.9"></circle>
  </g>

  <text class="ls-word" font-family="&#39;Space Grotesk&#39;,&#39;Segoe UI&#39;,system-ui,sans-serif" font-weight="500" fill="#ECFEFF" x="210" y="304" font-size="54" letter-spacing="-0.01em" text-anchor="middle">Aphelion</text>
  <rect x="180" y="324" width="60" height="3" rx="1.5" fill="url(#ls-tag)"></rect>
  <text class="ls-mono" font-family="&#39;JetBrains Mono&#39;,&#39;Consolas&#39;,monospace" font-weight="500" x="210" y="356" font-size="13" fill="url(#ls-tag)" text-anchor="middle">BY PENUMBRA</text>
</svg>