  <text font-family="&#39;JetBrains Mono&#39;,&#39;Consolas&#39;,monospace" font-weight="500" x="623" y="456" font-size="15" letter-spacing="0.22em" fill="#5EEAD4">100% OFFLINE · GPU AUTO-FIT · FULLY PRIVATE</text>
  <text font-family="&#39;JetBrains Mono&#39;,&#39;Consolas&#39;,monospace" font-weight="500" x="623" y="512" font-size="14" letter-spacing="0.24em" fill="#5A6B78">BY PENUMBRA</text>
