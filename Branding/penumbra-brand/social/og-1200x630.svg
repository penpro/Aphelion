    <circle cx="0" cy="0" r="166" fill="url(#og-bloom)" filter="url(#og-soft)"></circle>
    <circle cx="0" cy="0" r="136" fill="none" stroke="url(#og-ring)" stroke-width="36" filter="url(#og-soft)" opacity="0.9"></circle>
    <circle cx="0" cy="0" r="130" fill="#000000"></circle>
    <circle cx="0" cy="0" r="133" fill="none" stroke="url(#og-ring)" stroke-width="8" filter="url(#og-rim)"></circle>
    <circle cx="0" cy="0" r="133" fill="none" stroke="#ECFEFF" stroke-width="2.2" opacity="0.92"></circle>
  </g>

  <text font-family="&#39;Space Grotesk&#39;,&#39;Segoe UI&#39;,system-ui,sans-serif" font-weight="500" fill="#ECFEFF" x="620" y="312" font-size="104" letter-spacing="-0.01em">Aphelion</text>
  <rect x="623" y="346" width="96" height="4" rx="2" fill="url(#og-accent)"></rect>
