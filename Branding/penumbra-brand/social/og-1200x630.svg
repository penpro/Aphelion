<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aphelion — open graph card">
  <defs>
    
    <radialGradient id="og-bg" cx="32%" cy="44%" r="68%">
      <stop offset="0%" stop-color="#130A30"></stop><stop offset="55%" stop-color="#0C0426"></stop><stop offset="100%" stop-color="#07021A"></stop>
    </radialGradient>
    <linearGradient id="og-ring" x1="0.12" y1="0.1" x2="0.9" y2="0.92">
      <stop offset="0%" stop-color="#22D3EE"></stop><stop offset="34%" stop-color="#5EEAD4"></stop>
      <stop offset="62%" stop-color="#C084FC"></stop><stop offset="100%" stop-color="#FF79C6"></stop>
    </linearGradient>
    <radialGradient id="og-bloom" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#22D3EE" stop-opacity="0"></stop><stop offset="80%" stop-color="#5EEAD4" stop-opacity="0.45"></stop><stop offset="100%" stop-color="#C084FC" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="og-planet" cx="38%" cy="34%" r="72%">
