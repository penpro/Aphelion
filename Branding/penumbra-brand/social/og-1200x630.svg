    <linearGradient id="og-bracket" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#5EEAD4"></stop><stop offset="100%" stop-color="#FF79C6"></stop></linearGradient>
    <filter id="og-soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="16"></feGaussianBlur></filter>
    <filter id="og-rim" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3"></feGaussianBlur></filter>
    <filter id="og-halo" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="8"></feGaussianBlur></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)"></rect>
  <g fill="none" stroke="url(#og-bracket)" stroke-width="2.4" opacity="0.8">
