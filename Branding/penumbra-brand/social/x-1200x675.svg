  <text font-family="&#39;Space Grotesk&#39;,&#39;Segoe UI&#39;,system-ui,sans-serif" font-weight="500" fill="#ECFEFF" x="600" y="528" font-size="92" letter-spacing="-0.01em" text-anchor="middle">Aphelion</text>
