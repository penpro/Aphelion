  <text font-family="&#39;JetBrains Mono&#39;,&#39;Consolas&#39;,monospace" font-weight="500" x="600" y="646" font-size="13" letter-spacing="0.24em" fill="#5A6B78" text-anchor="middle">100% OFFLINE · GPU AUTO-FIT · BY PENUMBRA</text>
